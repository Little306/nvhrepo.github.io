<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVH Repo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

header{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(135deg,#007aff,#6a00ff);
}

header h1{
    font-size:50px;
}

header p{
    margin-top:10px;
    opacity:0.9;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.apps{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1a1a1a;
    border-radius:15px;
    padding:20px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:80px;
    border-radius:20px;
}

.card h2{
    margin-top:10px;
}

.download{
    display:inline-block;
    margin-top:15px;
    background:#007aff;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>

<body>

<header>
    <h1>🚀 NVH Repo</h1>
    <p>Kho ứng dụng, game và IPA của NVH</p>
    <a href="#" class="btn">Khám phá</a>
</header>

<section class="apps">

<div class="card">
    <img src="https://via.placeholder.com/80">
    <h2>TrollStore</h2>
    <p>Cài IPA vĩnh viễn.</p>
    <a href="#" class="download">Tải</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/80">
    <h2>Dopamine</h2>
    <p>Jailbreak iOS.</p>
    <a href="#" class="download">Tải</a>
</div>

<div class="card">
    <img src="https://via.placeholder.com/80">
    <h2>Liên Quân</h2>
    <p>Game MOBA phổ biến.</p>
    <a href="#" class="download">Tải</a>
</div>

</section>

<footer>
© 2026 NVH Repo
</footer>

</body>
</html>
